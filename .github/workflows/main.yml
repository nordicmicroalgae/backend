name: Build & Deploy

on: push

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                path: src

            - name: Install Django app files
              run: |
                mkdir -p ${GITHUB_WORKSPACE}/dist/app
                rsync -av \
                    --exclude=.git \
                    --exclude=.github \
                    --exclude=.gitignore \
                    --exclude=.editorconfig \
                    ${GITHUB_WORKSPACE}/src/ \
                    ${GITHUB_WORKSPACE}/dist/app/

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.10'
                architecture: 'x64'

            - name: Build wheel archives for dependencies
              run: |
                mkdir -p ${GITHUB_WORKSPACE}/dist/wheels
                python -m pip install --upgrade pip
                python -m pip wheel -v \
                  -r ${GITHUB_WORKSPACE}/src/requirements.txt \
                  -w ${GITHUB_WORKSPACE}/dist/wheels
                echo "--no-index" >> ${GITHUB_WORKSPACE}/dist/requirements.txt
                echo "--find-links wheels" >> ${GITHUB_WORKSPACE}/dist/requirements.txt
                cat ${GITHUB_WORKSPACE}/src/requirements.txt >> \
                    ${GITHUB_WORKSPACE}/dist/requirements.txt

            - name: Install dependencies from wheel archives
              run: |
                python -m pip install -v --no-index \
                  -f ${GITHUB_WORKSPACE}/dist/wheels \
                  -r ${GITHUB_WORKSPACE}/dist/requirements.txt

            - name: Install Django static files
              run: |
                python ${GITHUB_WORKSPACE}/src/manage.py \
                  collectstatic --no-input
                rsync -av \
                  ${GITHUB_WORKSPACE}/static/ \
                  ${GITHUB_WORKSPACE}/dist/static/

            - name: Archive Artifact
              uses: actions/upload-artifact@v4
              with:
                name: backend
                path: dist

    production:
        if: github.ref == 'refs/heads/azure'
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: Production
            url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
        permissions:
            id-token: write

        steps:
            - name: Download articfacts from build job
              uses: actions/download-artifact@v4
              with:
                name: backend
                path: .

            - name: Login to Azure
              uses: azure/login@v1
              with:
                client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_416E448743F1451FB2AF4D6815720EFA }}
                tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_02E8661D06814C2E82D816CC0169AFC3 }}
                subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2B4D017AE47F4CA682F2689E600E0F38 }}

            - name: Deploy to Azure Web App
              uses: azure/webapps-deploy@v2
              id: deploy-to-webapp
              with:
                app-name: 'nordicmicroalgae-next'
                slot-name: 'Production'
